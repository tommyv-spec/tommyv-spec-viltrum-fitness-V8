name: Deploy to Cloudflare

# Automatic production deploy: every push to main publishes the Cloudflare Worker
# (viltrum-fitness-v8) via `wrangler deploy`. Requires ONE repo secret:
#   CLOUDFLARE_API_TOKEN   - token with "Edit Cloudflare Workers" permission
# (account_id is set in wrangler.jsonc, so no account secret is needed.)
# Add it at: repo Settings > Secrets and variables > Actions > New repository secret.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows a manual "Run workflow" button in the Actions tab

concurrency:
  group: cf-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
